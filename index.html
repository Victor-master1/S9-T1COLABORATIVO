<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenidos - Git Page</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e1e2f 0%, #2a2a40 100%);
            color: #ffffff;
        }
        .card {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            max-width: 80%;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #00d2ff;
        }
        p {
            font-size: 1.2rem;
            color: #cfcfcf;
            line-height: 1.6;
        }
        .git-badge {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #f05032; /* Color oficial de Git */
            color: white;
            border-radius: 50px;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>¡Bienvenidos a mi página web!</h1>
        <p>Este sitio ha sido desplegado y gestionado utilizando el poder de la terminal.</p>
        <div class="git-badge">
            Hecho por comando en Git 🚀
        </div>
        <div class="footer">
            © 2024 - Creado con pasión por el código
        </div>
    </div>
</body>
</html>
